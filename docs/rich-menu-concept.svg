<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2500 1686" width="2500" height="1686">
  <title>予定お知らせ君 リッチメニュー コンセプト (minimal / 上下2分割)</title>
  <desc>LINE Messaging API リッチメニュー用。上段=目標設定 / 下段=予定確認（直近1週間）。温かみのあるクリーム単色ベースのミニマル構成。</desc>

  <!-- 背景: クリーム単色 -->
  <rect width="2500" height="1686" fill="#F5EDD9"/>

  <!-- 中央の区切り線 (控えめ) -->
  <line x1="300" y1="843" x2="2200" y2="843" stroke="#C9B88F" stroke-width="2"/>

  <!-- ================================================ -->
  <!-- 上段 (0-843) : 目標設定 -->
  <!-- ================================================ -->
  <g transform="translate(1250, 370)" stroke="#4A3A1F" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 旗のポール -->
    <line x1="-100" y1="-170" x2="-100" y2="180" stroke-width="12"/>
    <!-- 旗の布 -->
    <path d="M -100,-170 L 130,-125 L 70,-55 L 130,15 L -100,-30 Z" stroke-width="12"/>
    <!-- 台座 -->
    <line x1="-160" y1="180" x2="-40" y2="180" stroke-width="12"/>
  </g>
  <text x="1250" y="680" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"
        font-size="150" font-weight="700" fill="#3D2510" letter-spacing="24">目標設定</text>

  <!-- ================================================ -->
  <!-- 下段 (843-1686) : 予定確認 -->
  <!-- ================================================ -->
  <g transform="translate(1250, 1213)" stroke="#4A3A1F" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- カレンダー本体 -->
    <rect x="-160" y="-130" width="320" height="270" rx="18" stroke-width="12"/>
    <!-- ヘッダー区切り -->
    <line x1="-160" y1="-55" x2="160" y2="-55" stroke-width="10"/>
    <!-- リング -->
    <line x1="-90" y1="-160" x2="-90" y2="-95" stroke-width="14"/>
    <line x1="90"  y1="-160" x2="90"  y2="-95" stroke-width="14"/>
    <!-- 予定の行 -->
    <line x1="-105" y1="5"   x2="105" y2="5"   stroke-width="8"/>
    <line x1="-105" y1="55"  x2="65"  y2="55"  stroke-width="8"/>
    <line x1="-105" y1="105" x2="25"  y2="105" stroke-width="8"/>
  </g>
  <text x="1250" y="1523" text-anchor="middle"
        font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"
        font-size="150" font-weight="700" fill="#3D2510" letter-spacing="24">予定確認</text>
</svg>
